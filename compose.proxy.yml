name: ${PROXY_PROJECT_NAME:-chainso-proxy}

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      PROD_DOMAINS: ${PROD_DOMAINS:?Set PROD_DOMAINS}
      PROD_UPSTREAM: ${PROD_UPSTREAM:-chainso-prod-app:3000}
      STAGING_DOMAINS: ${STAGING_DOMAINS:?Set STAGING_DOMAINS}
      STAGING_UPSTREAM: ${STAGING_UPSTREAM:-chainso-staging-app:3000}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge

networks:
  edge:
    external: true
    name: ${EDGE_NETWORK:-chainso_edge}

volumes:
  caddy_data:
  caddy_config:
