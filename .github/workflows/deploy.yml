name: Deploy

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve environment
        id: env
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            target="${{ inputs.environment }}"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            target="production"
          else
            target="staging"
          fi

          echo "target=${target}" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [[ -z "$VPS_HOST" ]]; then
            echo "VPS_HOST secret is missing"
            exit 1
          fi

          if [[ -z "$VPS_SSH_KEY" ]]; then
            echo "VPS_SSH_KEY secret is missing"
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "$VPS_SSH_KEY" | sed 's/\r$//' > ~/.ssh/id_ed25519
          printf '\n' >> ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy staging
        if: steps.env.outputs.target == 'staging'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: ./scripts/deploy-staging-vps.sh

      - name: Deploy production
        if: steps.env.outputs.target == 'production'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: ./scripts/deploy-production-vps.sh
