name: ${COMPOSE_PROJECT_NAME:-chainso}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ${DATABASE_ENV_FILE:-./infra/env/database.env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ${DATABASE_ENV_FILE:-./infra/env/database.env}
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in infra/env/database.env}
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      data:
      edge:
        aliases:
          - ${APP_NETWORK_ALIAS:-chainso-app}

  migrate:
    profiles:
      - tools
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ${DATABASE_ENV_FILE:-./infra/env/database.env}
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in infra/env/database.env}
    networks:
      - data

networks:
  data:
    internal: true
  edge:
    external: true
    name: ${EDGE_NETWORK:-chainso_edge}

volumes:
  postgres_data:
